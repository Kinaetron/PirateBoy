name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --config Debug --target PirateBoyTests

      - name: Run tests
        working-directory: build
        run: ctest -C Debug --output-on-failure